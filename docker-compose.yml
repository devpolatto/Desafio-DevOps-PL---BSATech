name: bsatech-blog

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ghost:
    image: ghost:5-alpine
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      url: ${GHOST_URL:-https://localhost}
      database__client: mysql
      database__connection__host: mysql
      database__connection__port: 3306
      database__connection__database: ${MYSQL_DATABASE}
      database__connection__user: ${MYSQL_USER}
      database__connection__password: ${MYSQL_PASSWORD}
      NODE_ENV: production
      # Evita erros de email em ambiente sem SMTP; logs de email vão para stdout
      mail__transport: Direct
    volumes:
      - ghost_data:/var/lib/ghost/content
    networks:
      - blog_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2368/ 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      ghost:
        condition: service_started
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - blog_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v0.32.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - blog_network
      - monitoring_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  alertmanager:
    image: prom/alertmanager:v0.32.1
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - monitoring_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.15
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    # mysqld-exporter >= 0.15 usa flags + variável de senha separada
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=${MYSQL_USER}"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog_network
      - monitoring_network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring_network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - monitoring_network
    restart: unless-stopped

volumes:
  mysql_data:
  ghost_data:
  prometheus_data:
  grafana_data:

networks:
  blog_network:
    driver: bridge
  monitoring_network:
    driver: bridge
