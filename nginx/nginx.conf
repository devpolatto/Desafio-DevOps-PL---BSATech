server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options    "nosniff"                                     always;
    add_header X-XSS-Protection          "1; mode=block"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"    always;

    # ── Bloqueia acesso a arquivos e diretórios sensíveis ─────────────────────
    location ~ /\.(env|git|gitignore|htaccess|htpasswd|DS_Store) {
        deny all;
        return 403;
    }

    location ~ ^/(config\.js|config\.production\.json|package\.json) {
        deny all;
        return 403;
    }

    location ~ /node_modules/ {
        deny all;
        return 403;
    }

    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # ── Proxy reverso para o Ghost ────────────────────────────────────────────
    # Resolver do DNS interno do Docker (127.0.0.11) com variável para adiar
    # resolução de hostname ao runtime — evita falha de startup se ghost ainda
    # não estiver no ar e permite nginx -t fora da rede Docker.
    resolver 127.0.0.11 valid=30s;
    set $ghost_upstream "ghost:2368";

    location / {
        proxy_pass         http://$ghost_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  90s;
        proxy_connect_timeout 10s;

        # Buffers para evitar erros 502 em respostas grandes do Ghost
        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;
    }
}
