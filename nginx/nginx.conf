# hide nginx version from Server header and error pages
server_tokens off;

# rate limiting zone for Ghost admin panel (brute force protection)
limit_req_zone $binary_remote_addr zone=ghost_admin:10m rate=10r/m;

server {
    listen 80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_dhparam         /etc/nginx/certs/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"                                                                                                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                                                                                                                                           always;
    add_header X-Content-Type-Options    "nosniff"                                                                                                                                              always;
    add_header X-XSS-Protection          "0"                                                                                                                                                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                                                      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"                                                                                                             always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; frame-ancestors 'none';" always;

    # block all dotfiles generically; add explicit exception for .well-known if needed
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ ^/(config\.js|config\.production\.json|package\.json) {
        deny all;
        return 403;
    }

    location ~ /node_modules/ {
        deny all;
        return 403;
    }

    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # Resolver do DNS interno do Docker com variável para adiar resolução ao runtime
    resolver 127.0.0.11 valid=30s;
    set $ghost_upstream "ghost:2368";

    # rate limit applies only to the admin panel
    location /ghost/ {
        limit_req zone=ghost_admin burst=5 nodelay;

        proxy_pass         http://$ghost_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    90s;
        proxy_connect_timeout 10s;

        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;
    }

    location / {
        proxy_pass         http://$ghost_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    90s;
        proxy_connect_timeout 10s;

        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;
    }
}
