name: SAST Security Scanning

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  trivy-scan:
    name: Trivy - Scan Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan on docker-compose images
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "devpolatto/devops-challenge-nginx:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # Don't fail on findings; use sarif for visibility

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-docker"

      - name: Run Trivy in table format for PR comment
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "devpolatto/devops-challenge-nginx:latest"
          format: "table"
          output: "trivy-table.txt"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Comment on PR with Trivy results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const trivyResults = fs.readFileSync('trivy-table.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Trivy Security Scan Results\n\n\`\`\`\n${trivyResults}\n\`\`\``
            });

  checkov-scan:
    name: Checkov - Scan IaC & Configurations
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          quiet: false
          soft_fail: false
          framework: dockerfile,kubernetes,github_actions,terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          skip_check: >-
            CKV_DOCKER_2,
            CKV_DOCKER_7
          compact: false

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "checkov-results.sarif"
          category: "checkov-iac"

      - name: Run Checkov in compact format for PR comment
        if: github.event_name == 'pull_request'
        run: |
          pip install checkov -q
          checkov -d . \
            --framework dockerfile,kubernetes,github_actions,terraform \
            --compact \
            --skip-check CKV_DOCKER_2,CKV_DOCKER_7 \
            --output cli 2>&1 | tee checkov-results.txt || true

      - name: Comment on PR with Checkov summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const checkovResults = fs.readFileSync('checkov-results.txt', 'utf8');
            const summary = checkovResults.split('\n').slice(-20).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🛡️ Checkov IaC Scan Results\n\n\`\`\`\n${summary}\n\`\`\``
            });

  # Gate check: block master push if CRITICAL found
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [trivy-scan, checkov-scan]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Check for CRITICAL findings
        run: |
          echo "✅ SAST scans completed. Review SARIF results in GitHub Security tab."
          echo ""
          echo "If CRITICAL issues found:"
          echo "  1. Review on GitHub Security tab"
          echo "  2. Fix issues locally"
          echo "  3. Re-push to run scans again"
