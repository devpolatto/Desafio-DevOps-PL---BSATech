name: Docker Publish — Nginx

on:
  push:
    branches:
      - master
    paths:
      - "nginx/Dockerfile"
      - "nginx/nginx.conf"
      - "nginx/docker-entrypoint.sh"
  workflow_run:
    workflows: [Release Please]
    types: [completed]
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push bsatech-nginx
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          # If triggered by release-please, use the tag
          if [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="${{ github.ref_name }}"
          else
            # Otherwise try to get latest tag
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
            if [ "$VERSION" = "latest" ]; then
              VERSION="latest"
            fi
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_REPOSITORY }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
